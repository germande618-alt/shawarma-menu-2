<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

/* HERO */
.hero{
position:relative;
min-height:100vh;
background:url("Images/hero.jpg") center/cover no-repeat;
padding:20px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

/* CONTENT */
.content{
position:relative;
z-index:2;
max-width:600px;
}

/* LOGO */
.logo{
font-size:38px;
font-weight:700;
}
.logo span{
color:#f39c12;
font-size:16px;
display:block;
}

/* BUTTONS */
.btn{
display:flex;
align-items:center;
gap:10px;
padding:14px;
margin-top:12px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:14px;
}

/* MENU */
.menu{
margin-top:25px;
}
.menu h2{
margin-bottom:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
border-radius:18px;
padding:12px;
}

/* PRODUCTS GRID */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:12px;
}

/* IMAGE */
.item-img{
width:100%;
border-radius:10px;
}

/* PRICE */
.price{
color:#ccc;
margin-top:4px;
}

/* COUNTER */
.counter{
display:flex;
margin-top:8px;
}
.counter button{
flex:1;
border:none;
padding:8px;
font-size:16px;
}
.minus{
background:#c0392b;
color:#fff;
border-radius:8px 0 0 8px;
}
.plus{
background:#f39c12;
color:#fff;
border-radius:0 8px 8px 0;
}

/* PROFILE */
.profile{
position:absolute;
right:10px;
top:55%;
transform:translateY(-50%);
text-align:center;
z-index:2;
}
.profile img{
width:80px;
border-radius:50%;
border:3px solid #fff;
}
.profile h3{
font-size:14px;
margin-top:6px;
}
.profile p{
font-size:12px;
color:#ccc;
}

/* ORDER BUTTON */
.order-btn{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#1e8e3e;
padding:16px;
text-align:center;
border-radius:14px;
font-size:18px;
}
</style>

</head>

<body>

<div class="hero">

<div class="content">

<div class="logo">
Black Roll
<span>odessa</span>
</div>

<div class="btn">📍 Open location</div>
<div class="btn">📞 +31 6 82852044</div>
<div class="btn">💬 WhatsApp</div>

<div class="menu">
<h2>🍔 Menu</h2>

<div class="card">
<img src="Images/shawarma.png" class="item-img">
<h3>Shawarma XL</h3>
<div class="price">€18</div>
<div class="counter">
<button class="minus">-</button>
<button>0</button>
<button class="plus">+</button>
</div>
</div>

<div class="products">

<div class="card">
<img src="Images/pepsi.png" class="item-img">
<h4>Pepsi</h4>
<div class="price">€3</div>
</div>

<div class="card">
<img src="Images/cola.png" class="item-img">
<h4>Cola</h4>
<div class="price">€14.5</div>
</div>

<div class="card">
<img src="Images/redbull.png" class="item-img">
<h4>Red Bull</h4>
<div class="price">€3</div>
</div>

<div class="card">
<img src="Images/ayran.png" class="item-img">
<h4>Ayran</h4>
<div class="price">€3</div>
</div>

</div>

</div>
</div>

<div class="profile">
<img src="Images/person.png">
<h3>Ruslan</h3>
<p>Motivator</p>
</div>

</div>

<div class="order-btn">Order</div>

</body>
</html>
