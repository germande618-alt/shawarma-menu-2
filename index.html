<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

/* HERO */
.hero{
position:relative;
min-height:100vh;
background:url("Images/hero.jpg") center/contain no-repeat;
padding:20px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.35); /* меньше затемнение */
}

/* CONTENT */
.content{
position:relative;
z-index:2;
max-width:380px; /* сжали */
}

/* LOGO */
.logo{
font-size:28px;
font-weight:700;
}
.logo span{
color:#f39c12;
font-size:14px;
}

/* КНОПКИ */
.btn{
padding:10px;
margin-top:8px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(8px);
border-radius:10px;
font-size:14px;
}

/* MENU */
.menu{
margin-top:15px;
}

/* CARD */
.card{
background:rgba(0,0,0,0.5);
border-radius:15px;
padding:10px;
margin-top:10px;
}

/* ШАУРМА КВАДРАТ */
.main img{
width:100%;
height:150px;
object-fit:cover;
border-radius:12px;
}

/* GRID */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.products img{
width:100%;
height:100px;
object-fit:contain;
}

/* PROFILE */
.profile{
position:absolute;
right:10px;
top:55%;
transform:translateY(-50%);
}
.profile img{
width:60px;
border-radius:50%;
border:2px solid #fff;
}

/* ORDER */
.order-btn{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#1e8e3e;
padding:12px;
border-radius:10px;
text-align:center;
}

/* 📱 MOBILE */
@media (max-width:600px){

.hero{
background-size:cover;
}

.content{
max-width:320px;
}

.main img{
height:120px;
}

}
</style>

</head>

<body>

<div class="hero">

<div class="content">

<div class="logo">
Black Roll<br><span>odessa</span>
</div>

<div class="btn">📍 Open location</div>
<div class="btn">📞 +31 6 82852044</div>
<div class="btn">💬 WhatsApp</div>

<div class="menu">

<div class="card main">
<img src="Images/shawarma.png">
<h3>Shawarma XL</h3>
<p>€18</p>
</div>

<div class="products">

<div class="card">
<img src="Images/pepsi.png">
<p>Pepsi €3</p>
</div>

<div class="card">
<img src="Images/cola.png">
<p>Cola €14.5</p>
</div>

<div class="card">
<img src="Images/redbull.png">
<p>Red Bull €3</p>
</div>

<div class="card">
<img src="Images/ayran.png">
<p>Ayran €3</p>
</div>

</div>

</div>
</div>

<div class="profile">
<img src="Images/person.png">
</div>

</div>

<div class="order-btn">Order</div>

</body>
</html>
