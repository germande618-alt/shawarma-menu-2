          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Suluguni with meat">
        <img src="Images/shawarma.png">

    <button class="order" onclick="makeOrder()">Order</button>

  </div>

</div>

<!-- JS -->
<script>

let cart = {};

// кнопки + -
document.querySelectorAll('.card').forEach(card => {
  const minus = card.querySelector('.minus');
  const plus = card.querySelector('.plus');
  const count = card.querySelector('span');
  const name = card.dataset.name;

  cart[name] = 0;

  plus.onclick = () => {
    cart[name]++;
    count.innerText = cart[name];
  };

  minus.onclick = () => {
    if (cart[name] > 0) {
      cart[name]--;
      count.innerText = cart[name];
    }
  };
});

// ORDER
function makeOrder() {

  let userName = prompt("Your name:");
  if (!userName) return;

  let time = prompt("Pickup time:");
  if (!time) return;

  let message = "Order:\n\n";

  for (let item in cart) {
    if (cart[item] > 0) {
      message += item + " x" + cart[item] + "\n";
    }
  }

  if (message === "Order:\n\n") {
    alert("Cart is empty");
    return;
  }

  message += "\nName: " + userName;
  message += "\nTime: " + time;

  let url = "https://wa.me/31682852044?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

// кнопки сверху
function openMap() {
  window.open("https://maps.app.goo.gl/u4KELootzSrwkxp67", "_blank");
}

function callPhone() {
  window.location.href = "tel:+31682852044";
}

function openWhatsApp() {
  window.open("https://wa.me/31682852044", "_blank");
}

</script>
