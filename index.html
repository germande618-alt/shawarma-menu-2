<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;}

.hero{
position:relative;
min-height:100vh;
background:url("Images/hero.jpg") center/cover no-repeat;
padding:20px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.content{
position:relative;
z-index:2;
max-width:500px;
}

.logo{font-size:38px;font-weight:700;}
.logo span{color:#f39c12;font-size:16px;display:block;}

.btn{
display:flex;
align-items:center;
gap:10px;
padding:14px;
margin-top:12px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:14px;
}

.menu{margin-top:25px;}
.menu h2{margin-bottom:15px;}

.card{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
border-radius:18px;
padding:12px;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:12px;
}

.item-img{width:100%;border-radius:10px;}
.price{color:#ccc;margin-top:4px;}

.counter{
display:flex;
margin-top:8px;
}
.counter button{
flex:1;
border:none;
padding:8px;
font-size:16px;
}
.minus{background:#c0392b;color:#fff;border-radius:8px 0 0 8px;}
.plus{background:#f39c12;color:#fff;border-radius:0 8px 8px 0;}

.profile{
position:absolute;
right:10px;
bottom:120px;
text-align:center;
z-index:3;
}
.profile img{
width:80px;
border-radius:50%;
border:3px solid #fff;
}

.side-card{
position:absolute;
right:10px;
bottom:20px;
width:120px;
background:rgba(0,0,0,0.6);
border-radius:16px;
padding:10px;
text-align:center;
}

.order-btn{
position:fixed;
bottom:20px;
left:20px;
right:150px;
background:#1e8e3e;
padding:16px;
text-align:center;
border-radius:14px;
font-size:18px;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-content{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:300px;
text-align:center;
}

.modal button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#f39c12;
color:#fff;
font-size:16px;
}
</style>

</head>

<body>

<div class="hero">

<div class="content">

<div class="logo">
Black Roll
<span>odessa</span>
</div>

<div class="btn">📍 Open location</div>
<div class="btn">📞 +31 6 82852044</div>
<div class="btn">💬 WhatsApp</div>

<div class="menu">
<h2>🍔 Menu</h2>

<div class="card">
<img src="Images/shawarma.png" class="item-img">
<h3>Shawarma XL</h3>
<div class="price">€18</div>
</div>

<div class="products">

<div class="card">
<img src="Images/pepsi.png" class="item-img">
<h4>Pepsi</h4>
<div class="price">€3</div>
</div>

<div class="card">
<img src="Images/cola.png" class="item-img">
<h4>Cola</h4>
<div class="price">€14.5</div>
</div>

<div class="card">
<img src="Images/redbull.png" class="item-img">
<h4>Red Bull</h4>
<div class="price">€3</div>
</div>

<div class="card">
<img src="Images/ayran.png" class="item-img">
<h4>Ayran</h4>
<div class="price">€3</div>
</div>

</div>

</div>
</div>

<div class="profile">
<img src="Images/person.png">
</div>

<div class="side-card">
<img src="Images/ayran.png">
<div>Ayran €3</div>
</div>

</div>

<div class="order-btn" onclick="openModal()">Order</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Choose time</h3>

<button onclick="selectTime('Now')">Now</button>
<button onclick="selectTime('15 min')">15 min</button>
<button onclick="selectTime('30 min')">30 min</button>

</div>
</div>

<script>
function openModal(){
document.getElementById('modal').style.display='flex';
}

function selectTime(time){
alert("Order confirmed: " + time);
document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
