<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;}

/* HERO */
.hero{
position:relative;
min-height:100vh;
background:url("Images/hero.jpg") center/80% no-repeat; /* уменьшили фон */
padding:20px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.25); /* почти прозрачный */
}

/* CONTENT */
.content{
position:relative;
z-index:2;
max-width:320px;
}

/* LOGO */
.logo{
font-size:26px;
font-weight:700;
margin-bottom:5px;
}
.logo span{
color:#f39c12;
font-size:12px;
}

/* КНОПКИ (меньше) */
.btn{
padding:8px 10px;
margin-top:6px;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(6px);
border-radius:8px;
font-size:13px;
}

/* MENU */
.menu{
margin-top:15px;
}

/* КАРТОЧКИ */
.card{
background:#111;
border-radius:16px;
padding:12px;
margin-top:10px;
text-align:center;
}

/* ШАУРМА */
.main img{
width:100%;
height:130px;
object-fit:cover;
border-radius:12px;
}

/* GRID как на 2 фото */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

.products img{
width:100%;
height:100px;
object-fit:contain;
}

/* ТЕКСТ */
.price{
color:#ccc;
font-size:14px;
margin-top:5px;
}

/* PROFILE */
.profile{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
}
.profile img{
width:55px;
border-radius:50%;
border:2px solid #fff;
}

/* ORDER */
.order-btn{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:#1e8e3e;
padding:12px;
border-radius:10px;
text-align:center;
font-size:16px;
}

/* MOBILE */
@media (max-width:600px){

.hero{
background-size:90%;
}

.logo{
font-size:22px;
}

.products img{
height:90px;
}

}
</style>

</head>

<body>

<div class="hero">

<div class="content">

<div class="logo">
Black Roll<br><span>odessa</span>
</div>

<div class="btn">📍 Open location</div>
<div class="btn">📞 +31 6 82852044</div>
<div class="btn">💬 WhatsApp</div>

<div class="menu">

<div class="card main">
<img src="Images/shawarma.png">
<h3>Shawarma XL</h3>
<div class="price">€18</div>
</div>

<div class="products">

<div class="card">
<img src="Images/pepsi.png">
<div>Pepsi</div>
<div class="price">€3</div>
</div>

<div class="card">
<img src="Images/cola.png">
<div>Cola</div>
<div class="price">€14.5</div>
</div>

<div class="card">
<img src="Images/redbull.png">
<div>Red Bull</div>
<div class="price">€3</div>
</div>

<div class="card">
<img src="Images/ayran.png">
<div>Ayran</div>
<div class="price">€3</div>
</div>

</div>

</div>
</div>

<div class="profile">
<img src="Images/person.png">
</div>

</div>

<div class="order-btn">Order</div>

</body>
</html>
