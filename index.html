<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;}

/* HERO */
.hero{
position:relative;
min-height:100vh;
background:url("Images/hero.jpg") center/cover no-repeat;
padding:20px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* CONTENT */
.content{
position:relative;
z-index:2;
max-width:500px;
}

/* LOGO */
.logo{font-size:34px;font-weight:700;}
.logo span{color:#f39c12;font-size:14px;}

/* BUTTONS */
.btn{
padding:12px;
margin-top:10px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:12px;
}

/* MENU */
.menu{margin-top:20px;}
.menu h2{margin-bottom:10px;}

/* CARD */
.card{
background:rgba(0,0,0,0.55);
backdrop-filter:blur(10px);
border-radius:16px;
padding:10px;
}

/* ШАУРМА (фикс размера) */
.card.main img{
height:180px;
object-fit:cover;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.item-img{
width:100%;
border-radius:10px;
}

/* PROFILE (подняли выше) */
.profile{
position:absolute;
right:10px;
top:45%;
transform:translateY(-50%);
z-index:3;
}
.profile img{
width:70px;
border-radius:50%;
border:3px solid #fff;
}

/* SIDE CARD */
.side-card{
position:absolute;
right:10px;
bottom:20px;
width:110px;
background:rgba(0,0,0,0.6);
border-radius:14px;
padding:8px;
text-align:center;
}

/* ORDER */
.order-btn{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#1e8e3e;
padding:14px;
text-align:center;
border-radius:12px;
font-size:16px;
}

/* 📱 MOBILE FIX */
@media (max-width: 600px){

.logo{font-size:28px;}

.card.main img{
height:140px;
}

.profile{
top:40%;
}

.side-card{
width:90px;
}

}
</style>

</head>

<body>

<div class="hero">

<div class="content">

<div class="logo">
Black Roll
<br><span>odessa</span>
</div>

<div class="btn">📍 Open location</div>
<div class="btn">📞 +31 6 82852044</div>
<div class="btn">💬 WhatsApp</div>

<div class="menu">
<h2>🍔 Menu</h2>

<div class="card main">
<img src="Images/shawarma.png" class="item-img">
<h3>Shawarma XL</h3>
<p>€18</p>
</div>

<div class="products">

<div class="card">
<img src="Images/pepsi.png" class="item-img">
<p>Pepsi €3</p>
</div>

<div class="card">
<img src="Images/cola.png" class="item-img">
<p>Cola €14.5</p>
</div>

<div class="card">
<img src="Images/redbull.png" class="item-img">
<p>Red Bull €3</p>
</div>

<div class="card">
<img src="Images/ayran.png" class="item-img">
<p>Ayran €3</p>
</div>

</div>

</div>
</div>

<!-- PROFILE -->
<div class="profile">
<img src="Images/person.png">
</div>

<!-- SIDE -->
<div class="side-card">
<img src="Images/ayran.png">
<p>Ayran €3</p>
</div>

</div>

<div class="order-btn">Order</div>

</body>
</html>
