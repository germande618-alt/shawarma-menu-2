<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Roll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HERO -->
  <div class="hero">
    <img src="Images/hero.jpg" class="hero-bg">

    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Black Roll</h1>
      <span class="city">odessa</span>

      <div class="buttons">
        <button>📍 Open location</button>
        <button>📞 +31 6 82852044</button>
        <button>💬 WhatsApp</button>
      </div>
    </div>

    <div class="person">
      <img src="Images/person.png">
      <p>Ruslan<br><span>motivator</span></p>
    </div>

  </div>

  <!-- MENU -->
  <div class="menu">

    <h2>🍽 Menu</h2>

    <div class="card big">
      <img src="Images/shawarma.png">
      <h3>Shawarma XL</h3>
      <p>€18</p>
      <div class="counter">
        <button>-</button>
        <span>0</span>
        <button>+</button>
      </div>
    </div>

    <div class="grid">

      <div class="card">
        <img src="Images/pepsi.png">
        <h3>Pepsi</h3>
        <p>€3</p>
        <div class="counter">
          <button>-</button>
          <span>0</span>
          <button>+</button>
        </div>
      </div>

      <div class="card">
        <img src="Images/cola.png">
        <h3>Cola</h3>
        <p>€3</p>
        <div class="counter">
          <button>-</button>
          <span>0</span>
          <button>+</button>
        </div>
      </div>

      <div class="card">
        <img src="Images/redbull.png">
        <h3>Red Bull</h3>
        <p>€3</p>
        <div class="counter">
          <button>-</button>
          <span>0</span>
          <button>+</button>
        </div>
      </div>

      <div class="card">
        <img src="Images/ayran.png">
        <h3>Ayran</h3>
        <p>€3</p>
        <div class="counter">
          <button>-</button>
          <span>0</span>
          <button>+</button>
        </div>
      </div>

    </div>

    <button class="order">Order</button>

  </div>

</div>

</body>
</html>
