<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Black Roll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HERO -->
  <div class="hero">
    <img src="Images/hero.jpg" class="hero-bg">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Black Roll</h1>
      <span class="city">Odessa</span>

      <div class="buttons">
        <button onclick="openMap()">📍 Open location</button>
        <button onclick="callPhone()">📞 +31 6 82852044</button>
        <button onclick="openWhatsApp()">💬 WhatsApp</button>
      </div>
    </div>

    <div class="person">
      <img src="Images/person.png">
      <p>Ruslan<span>motivator</span></p>
    </div>
  </div>

  <!-- MENU -->
  <div class="menu">

    <h2>🍽 Menu</h2>

    <div class="grid">

      <!-- ШАУРМА -->
      <div class="card" data-name="Shawarma XL">
        <img src="Images/shawarma.png">
        <h3>Shawarma XL</h3>
        <p>€18</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Standard">
        <img src="Images/shawarma.png">
        <h3>Standard</h3>
        <p>€14.5</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Mini">
        <img src="Images/shawarma.png">
        <h3>Mini</h3>
        <p>€12</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Hawaii">
        <img src="Images/shawarma.png">
        <h3>Hawaii</h3>
        <p>€16</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Greek">
        <img src="Images/shawarma.png">
        <h3>Greek</h3>
        <p>€16</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Arabic">
        <img src="Images/shawarma.png">
        <h3>Arabic</h3>
        <p>€16</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Suluguni with meat">
        <img src="Images/shawarma.png">
        <h3>Suluguni with meat</h3>
        <p>€16</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

    </div>

    <h2 style="margin-top:20px;">🥤 Drinks</h2>

    <div class="grid">

      <div class="card" data-name="Pepsi">
        <img src="Images/pepsi.png">
        <h3>Pepsi</h3>
        <p>€3</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Cola">
        <img src="Images/cola.png">
        <h3>Cola</h3>
        <p>€3</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Red Bull">
        <img src="Images/redbull.png">
        <h3>Red Bull</h3>
        <p>€3</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Ayran">
        <img src="Images/ayran.png">
        <h3>Ayran</h3>
        <p>€3</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

      <div class="card" data-name="Fanta">
        <img src="Images/fanta.png">
        <h3>Fanta</h3>
        <p>€3</p>
        <div class="counter">
          <button class="minus">-</button>
          <span>0</span>
          <button class="plus">+</button>
        </div>
      </div>

    </div>

    <!-- ФОРМА -->
    <div class="order-form" id="orderForm">
      <input type="text" id="nameInput" placeholder="Your name">

      <div class="time-picker">
        <select id="hours"></select>
        <span>:</span>
        <select id="minutes"></select>
      </div>

      <button class="confirm-order" onclick="sendOrder()">Confirm Order</button>
    </div>

    <button class="order" onclick="toggleOrder()">Order</button>

  </div>

</div>

<script>

// КОРЗИНА
let cart = {};

document.querySelectorAll('.card').forEach(card => {
  const minus = card.querySelector('.minus');
  const plus = card.querySelector('.plus');
  const count = card.querySelector('span');
  const name = card.dataset.name;

  cart[name] = 0;

  plus.onclick = () => {
    cart[name]++;
    count.innerText = cart[name];
  };

  minus.onclick = () => {
    if (cart[name] > 0) {
      cart[name]--;
      count.innerText = cart[name];
    }
  };
});

// ВРЕМЯ
const hours = document.getElementById("hours");
const minutes = document.getElementById("minutes");

for (let i = 0; i < 24; i++) {
  let h = i.toString().padStart(2, '0');
  hours.innerHTML += `<option>${h}</option>`;
}

for (let i = 0; i < 60; i += 5) {
  let m = i.toString().padStart(2, '0');
  minutes.innerHTML += `<option>${m}</option>`;
}

// ПОКАЗ ФОРМЫ
function toggleOrder() {
  document.getElementById("orderForm").classList.toggle("active");
}

// ОТПРАВКА
function sendOrder() {

  let name = document.getElementById("nameInput").value;
  let hour = document.getElementById("hours").value;
  let minute = document.getElementById("minutes").value;

  if (!name) {
    alert("Enter your name");
    return;
  }

  let message = "Order:\n\n";

  for (let item in cart) {
    if (cart[item] > 0) {
      message += item + " x" + cart[item] + "\n";
    }
  }

  if (message === "Order:\n\n") {
    alert("Cart is empty");
    return;
  }

  message += "\nName: " + name;
  message += "\nTime: " + hour + ":" + minute;

  window.open("https://wa.me/31682852044?text=" + encodeURIComponent(message));
}

// КНОПКИ
function openMap() {
  window.open("https://maps.app.goo.gl/zLtu4w1jdmJBHS1a6");
}

function callPhone() {
  window.location.href = "tel:+31682852044";
}

function openWhatsApp() {
  window.open("https://wa.me/31682852044");
}

</script>

</body>
</html>
