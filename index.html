<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Roll</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

/* HERO */
.hero{
position:relative;
min-height:100vh;
background:url("Images/hero.jpg") center/cover no-repeat;
padding:40px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* LAYOUT */
.wrapper{
position:relative;
z-index:2;
display:flex;
gap:40px;
}

/* LEFT */
.left{
flex:1;
max-width:600px;
}

/* RIGHT */
.right{
width:260px;
}

/* LOGO */
.logo{
font-size:48px;
font-weight:bold;
}
.logo span{
color:#f39c12;
font-size:18px;
}

/* BUTTONS */
.btn{
margin-top:15px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

/* MENU */
.menu{
margin-top:30px;
}

.card{
background:rgba(0,0,0,0.5);
border-radius:20px;
padding:15px;
margin-top:15px;
}

/* MAIN CARD (ШАУРМА) */
.main img{
height:180px;
object-fit:cover;
width:100%;
border-radius:15px;
}

/* GRID */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.products img{
width:100%;
border-radius:12px;
}

/* PROFILE RIGHT */
.profile{
text-align:center;
}
.profile img{
width:120px;
border-radius:50%;
border:4px solid #fff;
}

/* SIDE CARD */
.side-card{
margin-top:20px;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:15px;
text-align:center;
}
.side-card img{
width:100%;
border-radius:12px;
}

/* ORDER */
.order-btn{
margin-top:15px;
background:#1e8e3e;
padding:15px;
border-radius:12px;
text-align:center;
}

/* 📱 MOBILE */
@media (max-width: 900px){

.wrapper{
flex-direction:column;
}

.right{
width:100%;
}

.profile{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
}

}
</style>

</head>

<body>

<div class="hero">

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<div class="logo">
Black Roll<br><span>odessa</span>
</div>

<div class="btn">📍 Open location</div>
<div class="btn">📞 +31 6 82852044</div>
<div class="btn">💬 WhatsApp</div>

<div class="menu">

<div class="card main">
<img src="Images/shawarma.png">
<h3>Shawarma XL</h3>
<p>€18</p>
</div>

<div class="products">

<div class="card">
<img src="Images/pepsi.png">
<p>Pepsi €3</p>
</div>

<div class="card">
<img src="Images/cola.png">
<p>Cola €14.5</p>
</div>

<div class="card">
<img src="Images/redbull.png">
<p>Red Bull €3</p>
</div>

<div class="card">
<img src="Images/ayran.png">
<p>Ayran €3</p>
</div>

</div>

</div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="profile">
<img src="Images/person.png">
<h3>Ruslan</h3>
<p>Motivator</p>
</div>

<div class="side-card">
<img src="Images/ayran.png">
<p>Ayran €3</p>
</div>

<div class="order-btn">Order</div>

</div>

</div>

</div>

</body>
</html>
